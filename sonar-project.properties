sonar.projectKey=luisfarfan_liquid-glass-angular
sonar.organization=luisfarfan

sonar.projectName=glassng
sonar.projectVersion=0.1.6

# Sources
sonar.sources=libs/glassng/src
sonar.tests=libs/glassng/src,apps/playground-e2e/src
sonar.test.inclusions=**/*.spec.ts,**/*.e2e.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.d.ts,**/coverage/**

# TypeScript
sonar.typescript.tsconfigPath=libs/glassng/tsconfig.lib.json

# Coverage — generated by: npx nx run glassng:test --coverage
sonar.javascript.lcov.reportPaths=coverage/libs/glassng/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
