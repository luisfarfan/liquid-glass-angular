<div class="max-w-5xl mx-auto space-y-16 py-10 fade-in">
  
  <header class="space-y-2 border-b border-white/10 pb-8">
     <div class="flex items-center gap-3 mb-2">
      <span class="px-2 py-0.5 rounded bg-neon-primary/10 text-neon-primary text-[10px] font-bold tracking-widest uppercase">Molecule</span>
      <span class="text-white/20">/</span>
      <span class="text-white/60 text-xs">Molecules</span>
    </div>
    <h2 class="text-3xl font-bold">Toggles & Switches</h2>
    <p class="text-white/40">Immediate binary state switching with physical snapping feedback.</p>
  </header>

  <!-- Toggle Switch -->
  <section class="space-y-10">
    <div class="space-y-6">
      <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Liquid Glass Switches (Fixed Hybrid)</h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Premium Toggle 1 -->
        <label class="glass-2 p-8 rounded-3xl flex items-center justify-between cursor-pointer group relative overflow-hidden transition-all hover:bg-white/5 border-white/5 hover:border-white/10">
           <div class="space-y-1 z-10">
              <p class="font-bold text-lg group-has-[:checked]:text-neon-primary transition-all duration-500">System Monitoring</p>
              <p class="text-xs text-white/30 group-has-[:checked]:text-neon-primary/50 transition-all duration-500">Real-time telemetry and neural link status.</p>
           </div>
           
           <div class="relative z-10 w-14 h-7">
              <input type="checkbox" class="sr-only peer">
              
              <!-- Switch Track (Sibling) -->
              <div class="absolute inset-0 rounded-full bg-black/40 backdrop-blur-md border border-white/10 transition-all duration-500 
                          peer-checked:bg-neon-primary/20 peer-checked:border-neon-primary/50 peer-checked:shadow-[0_0_20px_rgba(0,240,255,0.15)]
                          peer-focus-visible:ring-2 peer-focus-visible:ring-neon-primary peer-focus-visible:ring-offset-4 peer-focus-visible:ring-offset-zinc-950">
              </div>
              
              <!-- Switch Thumb (Sibling - Now it moves!) -->
              <div class="absolute top-1 left-1 w-5 h-5 rounded-full bg-white/20 border border-white/30 shadow-[0_2px_5px_rgba(0,0,0,0.5)] transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) transform 
                          peer-checked:translate-x-7 peer-checked:bg-neon-primary peer-checked:border-white/50 
                          peer-checked:shadow-[0_0_15px_rgba(0,240,255,0.8),_inset_0_0_5px_rgba(255,255,255,0.8)] pointer-events-none">
              </div>
           </div>
           <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-neon-primary/5 blur-[50px] rounded-full opacity-0 group-has-[:checked]:opacity-100 transition-opacity duration-1000"></div>
        </label>

        <!-- Premium Toggle 2 -->
        <label class="glass-2 p-8 rounded-3xl flex items-center justify-between cursor-pointer group relative overflow-hidden transition-all hover:bg-white/5 border-white/5 hover:border-white/10">
           <div class="space-y-1 z-10">
              <p class="font-bold text-lg group-has-[:checked]:text-neon-primary transition-all duration-500">Ambient Lighting</p>
              <p class="text-xs text-white/30 group-has-[:checked]:text-neon-primary/50 transition-all duration-500">Enable holographic background artifacts.</p>
           </div>
           
           <div class="relative z-10 w-14 h-7">
              <input type="checkbox" checked class="sr-only peer">
              <div class="absolute inset-0 rounded-full bg-black/40 backdrop-blur-md border border-white/10 transition-all duration-500 
                          peer-checked:bg-neon-primary/20 peer-checked:border-neon-primary/50 peer-checked:shadow-[0_0_20px_rgba(0,240,255,0.15)]
                          peer-focus-visible:ring-2 peer-focus-visible:ring-neon-primary peer-focus-visible:ring-offset-4 peer-focus-visible:ring-offset-zinc-950">
              </div>
              <div class="absolute top-1 left-1 w-5 h-5 rounded-full bg-white/20 border border-white/30 shadow-[0_2px_5px_rgba(0,0,0,0.5)] transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) transform 
                          peer-checked:translate-x-7 peer-checked:bg-neon-primary peer-checked:border-white/50 
                          peer-checked:shadow-[0_0_15px_rgba(0,240,255,0.8),_inset_0_0_5px_rgba(255,255,255,0.8)] pointer-events-none">
              </div>
           </div>
           <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-neon-primary/5 blur-[50px] rounded-full opacity-0 group-has-[:checked]:opacity-100 transition-opacity duration-1000"></div>
        </label>
      </div>
    </div>
  </section>

  <!-- Checkboxes & Radios -->
  <section class="space-y-10">
    <div class="space-y-6">
      <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Selection Atoms (Fixed Logic)</h3>
      
      <div class="glass-1 p-8 rounded-2xl space-y-8">
         <!-- Custom Checkbox -->
         <label class="flex items-center gap-4 cursor-pointer group">
            <div class="relative w-5 h-5">
               <input type="checkbox" class="sr-only peer">
               <!-- Checkbox Box (Sibling) -->
               <div class="absolute inset-0 rounded bg-black/60 border border-white/10 transition-all peer-checked:bg-neon-primary/10 peer-checked:border-neon-primary peer-checked:shadow-[0_0_10px_rgba(0,240,255,0.2)] group-hover:border-white/40 peer-focus-visible:ring-2 peer-focus-visible:ring-neon-primary peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-black"></div>
               <!-- Check Icon (Sibling - Now it shows!) -->
               <svg class="absolute inset-0.5 w-4 h-4 text-neon-primary scale-0 transition-transform duration-300 peer-checked:scale-100 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
            <span class="text-sm font-medium text-white/40 peer-checked:text-white transition-colors">Agree to system terms and conditions</span>
         </label>

         <!-- Custom Radio -->
         <label class="flex items-center gap-4 cursor-pointer group">
            <div class="relative w-5 h-5">
               <input type="radio" name="server" checked class="sr-only peer">
               <div class="absolute inset-0 rounded-full bg-black/60 border border-white/10 transition-all peer-checked:bg-neon-primary/10 peer-checked:border-neon-primary peer-checked:shadow-[0_0_10px_rgba(0,240,255,0.2)] group-hover:border-white/40 peer-focus-visible:ring-2 peer-focus-visible:ring-neon-primary peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-black"></div>
               <div class="absolute top-1.5 left-1.5 w-2 h-2 rounded-full bg-neon-primary scale-0 transition-transform duration-300 peer-checked:scale-100 shadow-[0_0_5px_rgba(255,255,255,1)] pointer-events-none"></div>
            </div>
            <span class="text-sm font-medium text-white/40 peer-checked:text-neon-primary transition-colors">Primary Production Node</span>
         </label>

         <label class="flex items-center gap-4 cursor-pointer group">
            <div class="relative w-5 h-5">
               <input type="radio" name="server" class="sr-only peer">
               <div class="absolute inset-0 rounded-full bg-black/60 border border-white/10 transition-all peer-checked:bg-neon-primary/10 peer-checked:border-neon-primary peer-checked:shadow-[0_0_10px_rgba(0,240,255,0.2)] group-hover:border-white/40 peer-focus-visible:ring-2 peer-focus-visible:ring-neon-primary peer-focus-visible:ring-offset-2 peer-focus-visible:ring-offset-black"></div>
               <div class="absolute top-1.5 left-1.5 w-2 h-2 rounded-full bg-neon-primary scale-0 transition-transform duration-300 peer-checked:scale-100 shadow-[0_0_5px_rgba(255,255,255,1)] pointer-events-none"></div>
            </div>
            <span class="text-sm font-medium text-white/40 peer-checked:text-neon-primary transition-colors">Secondary Staging Environment</span>
         </label>
      </div>
    </div>
  </section>
</div>
