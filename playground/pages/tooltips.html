<div class="max-w-5xl mx-auto space-y-16 py-10 fade-in">
  
  <header class="space-y-2 border-b border-white/10 pb-8">
     <div class="flex items-center gap-3 mb-2">
      <span class="px-2 py-0.5 rounded bg-purple-500/10 text-purple-400 text-[10px] font-bold tracking-widest uppercase">Molecule</span>
      <span class="text-white/20">/</span>
      <span class="text-white/60 text-xs">Overlays</span>
    </div>
    <h2 class="text-3xl font-bold">Tooltips</h2>
    <p class="text-white/40">Micro-contextual hints with a 300ms delayed Liquid Glass entry.</p>
  </header>

  <!-- Interactive Demo Section -->
  <section class="space-y-10">
    <div class="glass-1 p-20 rounded-2xl flex flex-col items-center justify-center bg-black/10 gap-16">
       
       <div class="flex flex-wrap gap-12 items-center justify-center">
          
          <!-- Tooltip Trigger 1 -->
          <div class="relative group">
             <button class="w-12 h-12 rounded-full glass-2 border-white/10 flex items-center justify-center hover:border-neon-primary/40 transition-colors">
                <svg class="w-5 h-5 text-white/50 group-hover:text-neon-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
             </button>
             
             <!-- Tooltip Body -->
             <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-3 py-1.5 glass-3 rounded-lg border border-white/10 text-[11px] font-bold whitespace-nowrap shadow-2xl transition-all duration-200 opacity-0 scale-95 pointer-events-none group-hover:opacity-100 group-hover:scale-100 group-hover:delay-[300ms]">
                Download Logs (.csv)
                <!-- Optional pointer arrow -->
                <div class="absolute top-full left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[6px] border-t-white/10"></div>
             </div>
          </div>

          <!-- Tooltip Trigger 2 -->
          <div class="relative group">
             <button class="w-12 h-12 rounded-full glass-2 border-white/10 flex items-center justify-center hover:border-red-500/40 transition-colors">
                <svg class="w-5 h-5 text-white/50 group-hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
             </button>
             
             <!-- Tooltip Body -->
             <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-3 py-1.5 glass-3 rounded-lg border border-red-500/20 text-[11px] font-bold text-red-400 whitespace-nowrap shadow-2xl transition-all duration-200 opacity-0 scale-95 pointer-events-none group-hover:opacity-100 group-hover:scale-100 group-hover:delay-[300ms]">
                Wipe Local Storage
             </div>
          </div>

          <!-- Tooltip Trigger 3 -->
          <div class="relative group">
            <span class="text-sm font-medium border-b border-dashed border-white/20 hover:border-neon-primary transition-colors cursor-help">Cluster Sharding</span>
            
            <!-- Tooltip Body -->
            <div class="absolute top-full left-0 mt-3 w-48 p-3 glass-3 rounded-xl border border-white/10 text-[10px] text-white/60 leading-relaxed shadow-2xl transition-all duration-200 opacity-0 -translate-y-2 pointer-events-none group-hover:opacity-100 group-hover:translate-y-0 group-hover:delay-[300ms]">
               Process of splitting data across multiple high-performance SSD nodes to increase throughput.
            </div>
         </div>

       </div>

    </div>
  </section>

</div>
