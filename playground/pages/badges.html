<div class="max-w-5xl mx-auto space-y-16 py-10 fade-in">
  
  <header class="space-y-2 border-b border-white/10 pb-8">
     <div class="flex items-center gap-3 mb-2">
      <span class="px-2 py-0.5 rounded bg-neon-primary/10 text-neon-primary text-[10px] font-bold tracking-widest uppercase">Atom</span>
      <span class="text-white/20">/</span>
      <span class="text-white/60 text-xs">Atoms</span>
    </div>
    <h2 class="text-3xl font-bold">Badges & Pills</h2>
    <p class="text-white/40">Compact status indicators and metadata markers.</p>
  </header>

  <!-- Visual Variants -->
  <section class="space-y-10">
    <div class="space-y-4">
      <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Glass Badges</h3>
      <div class="glass-1 p-8 rounded-2xl flex flex-wrap gap-4 items-center bg-black/10">
         <span class="px-2.5 py-0.5 rounded-full glass-2 text-[11px] font-bold text-white/80 border-white/10 uppercase tracking-wider">Neutral</span>
         <span class="px-2.5 py-0.5 rounded-full bg-neon-primary/10 border border-neon-primary/30 text-[11px] font-bold text-neon-primary uppercase tracking-wider">Processing</span>
         <span class="px-2.5 py-0.5 rounded-full bg-green-500/10 border border-green-500/30 text-[11px] font-bold text-green-400 uppercase tracking-wider">Success</span>
         <span class="px-2.5 py-0.5 rounded-full bg-red-500/10 border border-red-500/30 text-[11px] font-bold text-red-400 uppercase tracking-wider">Rejected</span>
         <span class="px-2.5 py-0.5 rounded-full bg-amber-500/10 border border-amber-500/30 text-[11px] font-bold text-amber-400 uppercase tracking-wider">Pending</span>
      </div>
    </div>
  </section>

  <!-- Status Dots -->
  <section class="space-y-6">
    <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Status Indicators</h3>
    <div class="glass-1 p-8 rounded-2xl grid grid-cols-1 md:grid-cols-3 gap-6">
       <div class="flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/5">
          <span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)] animate-pulse"></span>
          <span class="text-sm font-medium">Service Online</span>
       </div>
       <div class="flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/5">
          <span class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]"></span>
          <span class="text-sm font-medium">Critical Failure</span>
       </div>
       <div class="flex items-center gap-3 p-4 bg-white/5 rounded-xl border border-white/5">
          <span class="w-2 h-2 rounded-full bg-zinc-500"></span>
          <span class="text-sm font-medium text-white/40">Maintenance</span>
       </div>
    </div>
  </section>

  <!-- Sizes -->
  <section class="space-y-6">
    <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Sizing Scale</h3>
    <div class="glass-1 p-8 rounded-2xl flex items-center gap-8">
       <span class="px-2 py-0.5 rounded-full glass-2 text-[9px] font-black uppercase tracking-widest">Small</span>
       <span class="px-2.5 py-0.5 rounded-full glass-2 text-[11px] font-bold uppercase tracking-widest">Normal</span>
       <span class="px-4 py-1.5 rounded-full glass-2 text-[13px] font-bold uppercase tracking-widest">Large Pill</span>
    </div>
  </section>

</div>
