<div class="max-w-5xl mx-auto space-y-16 py-10 fade-in">
  
  <header class="space-y-2 border-b border-white/10 pb-8">
     <div class="flex items-center gap-3 mb-2">
      <span class="px-2 py-0.5 rounded bg-neon-primary/10 text-neon-primary text-[10px] font-bold tracking-widest uppercase">Molecule</span>
      <span class="text-white/20">/</span>
      <span class="text-white/60 text-xs">Molecules</span>
    </div>
    <h2 class="text-3xl font-bold">Tabs</h2>
    <p class="text-white/40">Context switching with fluid indicators and glass track backgrounds.</p>
  </header>

  <!-- Underline Variant -->
  <section class="space-y-6">
    <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">01. Integrated Radio-Tabs (Underline)</h3>
    <div class="glass-1 p-10 rounded-2xl">
       <div class="flex items-center gap-8 border-b border-white/10">
          
          <label class="relative pb-4 cursor-pointer group outline-none">
             <input type="radio" name="nav-tabs" checked class="sr-only peer">
             <span class="text-sm font-medium text-white/40 group-hover:text-white transition-colors peer-checked:text-neon-primary peer-checked:font-bold peer-focus-visible:ring-2 peer-focus-visible:ring-neon-primary rounded px-1">Overview</span>
             <div class="absolute bottom-0 left-0 w-full h-[2px] bg-neon-primary scale-x-0 transition-transform peer-checked:scale-x-100 shadow-[0_4px_10px_-4px_rgba(0,240,255,1)]"></div>
          </label>

          <label class="relative pb-4 cursor-pointer group">
             <input type="radio" name="nav-tabs" class="sr-only peer">
             <span class="text-sm font-medium text-white/40 group-hover:text-white transition-colors peer-checked:text-neon-primary peer-checked:font-bold">Team Access</span>
             <div class="absolute bottom-0 left-0 w-full h-[2px] bg-neon-primary scale-x-0 transition-transform peer-checked:scale-x-100 shadow-[0_4px_10px_-4px_rgba(0,240,255,1)]"></div>
          </label>

          <label class="relative pb-4 cursor-pointer group">
             <input type="radio" name="nav-tabs" class="sr-only peer">
             <span class="text-sm font-medium text-white/40 group-hover:text-white transition-colors peer-checked:text-neon-primary peer-checked:font-bold">Logs</span>
             <div class="absolute bottom-0 left-0 w-full h-[2px] bg-neon-primary scale-x-0 transition-transform peer-checked:scale-x-100 shadow-[0_4px_10px_-4px_rgba(0,240,255,1)]"></div>
          </label>

       </div>
       <div class="py-12 flex flex-col items-center justify-center border-t-0 bg-white/5 rounded-b-xl border border-white/5">
          <p class="text-xs text-white/20 italic tracking-widest font-bold">Dynamic content container</p>
          <p class="text-[10px] text-white/30 uppercase mt-2">Driven by native radio selection state</p>
       </div>
    </div>
  </section>

  <!-- Pill Variant -->
  <section class="space-y-6">
    <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">02. Recessed Radio-Pills</h3>
    <div class="glass-1 p-10 rounded-2xl flex items-center justify-center">
       <div class="inline-flex p-1 bg-black/40 border border-white/5 rounded-xl gap-1">
          
          <label class="cursor-pointer group outline-none">
             <input type="radio" name="pill-filter" checked class="sr-only peer">
             <div class="px-6 py-2 rounded-lg text-white/40 text-xs font-medium transition-all peer-checked:bg-white/10 peer-checked:text-white peer-checked:shadow-sm peer-focus-visible:ring-2 peer-focus-visible:ring-neon-primary">All Files</div>
          </label>

          <label class="cursor-pointer group">
             <input type="radio" name="pill-filter" class="sr-only peer">
             <div class="px-6 py-2 rounded-lg text-white/40 text-xs font-medium transition-all peer-checked:bg-white/10 peer-checked:text-white peer-checked:shadow-sm">Shared</div>
          </label>

          <label class="cursor-pointer group">
             <input type="radio" name="pill-filter" class="sr-only peer">
             <div class="px-6 py-2 rounded-lg text-white/40 text-xs font-medium transition-all peer-checked:bg-white/10 peer-checked:text-white peer-checked:shadow-sm">Archived</div>
          </label>

       </div>
    </div>
  </section>
</div>
