<div class="max-w-5xl mx-auto space-y-16 py-10 fade-in">
  
  <header class="space-y-2 border-b border-white/10 pb-8">
    <div class="flex items-center gap-3 mb-2">
      <span class="px-2 py-0.5 rounded bg-neon-primary/10 text-neon-primary text-[10px] font-bold tracking-widest uppercase">Atom</span>
      <span class="text-white/20">/</span>
      <span class="text-white/60 text-xs">Atoms</span>
    </div>
    <h2 class="text-3xl font-bold">Inputs & Fields</h2>
    <p class="text-white/40">Capture data with etched glass surfaces and neon focus illumination.</p>
  </header>

  <!-- Input Variants -->
  <section class="space-y-10">
    <div class="space-y-6">
      <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Standard Text Fields</h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Default State -->
        <div class="space-y-3">
          <label class="text-xs font-semibold text-white/50 px-1">Email Address</label>
          <div class="relative">
            <input type="email" placeholder="name@company.com" 
              class="w-full h-11 bg-black/40 border border-white/10 rounded-xl px-4 text-sm text-white placeholder:text-white/20 transition-all focus:outline-none focus:border-neon-primary focus:ring-1 focus:ring-neon-primary/40 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]">
          </div>
          <p class="text-[10px] text-white/20 px-1">We'll never share your email with anyone else.</p>
        </div>

        <!-- Focus Simulation -->
        <div class="space-y-3">
          <label class="text-xs font-semibold text-neon-primary px-1">Active Focus</label>
          <div class="relative">
            <input type="text" value="Liquid Glass Design" 
              class="w-full h-11 bg-black/20 border border-neon-primary rounded-xl px-4 text-sm text-white ring-1 ring-neon-primary/40 shadow-[0_0_15px_rgba(0,240,255,0.1)] focus:outline-none">
          </div>
          <p class="text-[10px] text-neon-primary/60 px-1 italic">Neon focus tokens applied.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Advanced Fields -->
  <section class="space-y-10">
    <div class="space-y-6">
      <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Complex Field Combinations</h3>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Icon Input -->
        <div class="space-y-3">
          <label class="text-xs font-semibold text-white/50 px-1">Search Database</label>
          <div class="relative">
             <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
             </span>
             <input type="text" placeholder="Search components..." 
              class="w-full h-11 bg-black/40 border border-white/10 rounded-xl pl-11 pr-4 text-sm text-white placeholder:text-white/20 transition-all focus:outline-none focus:border-neon-primary focus:ring-1 focus:ring-neon-primary/20">
          </div>
        </div>

        <!-- Password Field with View Toggle -->
        <div class="space-y-3">
          <label class="text-xs font-semibold text-white/50 px-1">Access Token</label>
          <div class="relative">
             <input type="password" value="••••••••••••" 
              class="w-full h-11 bg-black/40 border border-white/10 rounded-xl px-4 text-sm text-white placeholder:text-white/20 transition-all focus:outline-none focus:border-neon-primary focus:ring-1 focus:ring-neon-primary/20">
             <button class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-neon-primary transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
             </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Error States -->
  <section class="space-y-6">
    <h3 class="text-xs uppercase tracking-[0.2em] font-bold text-white/40">Validation & Errors</h3>
    <div class="glass-1 p-8 rounded-2xl bg-black/10">
       <div class="max-w-md space-y-4">
          <div class="space-y-2">
            <label class="text-xs font-semibold text-red-500/80 px-1">API Key</label>
            <input type="text" value="INVALID_KEY_001" 
              class="w-full h-11 bg-red-500/5 border border-red-500/50 rounded-xl px-4 text-sm text-red-400 focus:outline-none focus:ring-1 focus:ring-red-500/40">
            <p class="flex items-center gap-1.5 text-[10px] text-red-500/70 px-1 font-medium italic">
               <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
               The provided key is unauthorized.
            </p>
          </div>
       </div>
    </div>
  </section>

</div>
