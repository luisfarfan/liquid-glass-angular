name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Copy root README to library
        run: cp README.md libs/glassng/README.md

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release (version & changelog)
        run: npm run release

      - name: Push release commit and tags
        run: git push --follow-tags origin HEAD:main

      - name: Verify build artifacts
        run: ls -R dist/libs/glassng

      - name: Publish to npm (next dist-tag)
        if: env.NODE_AUTH_TOKEN != ''
        run: npm run release:publish -- --tag=alpha

      - name: Create GitHub release from latest tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="$(git describe --tags --abbrev=0)"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
            exit 0
          fi
          gh release create "$TAG_NAME" --generate-notes
