name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release (version & changelog)
        id: release
        run: |
          BEFORE=$(node -p "require('./libs/glassng/package.json').version")
          npm run release
          AFTER=$(node -p "require('./libs/glassng/package.json').version")
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "No version bump — skipping publish"
          else
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "Bumped $BEFORE → $AFTER"
          fi

      - name: Push release commit and tags
        if: steps.release.outputs.bumped == 'true'
        run: git push --follow-tags origin HEAD:main

      - name: Verify build artifacts
        if: steps.release.outputs.bumped == 'true'
        run: ls -R dist/libs/glassng

      - name: Inject root README into dist
        if: steps.release.outputs.bumped == 'true'
        run: cp README.md dist/libs/glassng/README.md

      - name: Publish to npm (alpha dist-tag)
        if: steps.release.outputs.bumped == 'true' && env.NODE_AUTH_TOKEN != ''
        run: npm run release:publish -- --tag=alpha

      - name: Promote alpha to latest
        if: steps.release.outputs.bumped == 'true' && env.NODE_AUTH_TOKEN != ''
        run: |
          VERSION=$(node -p "require('./libs/glassng/package.json').version")
          npm dist-tag add glassng@$VERSION latest

      - name: Create GitHub release from latest tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="$(git describe --tags --abbrev=0)"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
            exit 0
          fi
          gh release create "$TAG_NAME" --generate-notes
